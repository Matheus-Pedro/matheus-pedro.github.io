<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matheus Pedro</title>
  <link rel="shortcut icon" type="image/png" href="./media/images/github.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
  <!-- https://devicon.dev/ -->
  <style>
    .card:hover {
      transform: translateY(-5px);
    }
    .modal-bg {
      backdrop-filter: blur(5px);
    }
    body {
      scroll-behavior: smooth;
    }
    
    /* Mesh Gradientes */
    .mesh-gradient-1 {
      background-color: rgba(10, 10, 10, 0.9);
      position: relative;
      overflow: hidden;
    }
    
    .mesh-gradient-1::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 20%, rgba(234, 179, 8, 0.08), transparent 25%),
                  radial-gradient(circle at 70% 60%, rgba(234, 179, 8, 0.05), transparent 25%),
                  radial-gradient(circle at 20% 80%, rgba(250, 204, 21, 0.04), transparent 25%),
                  radial-gradient(circle at 90% 10%, rgba(202, 138, 4, 0.06), transparent 25%);
      z-index: 0;
      animation: meshMove 15s ease-in-out infinite alternate, meshFade 20s ease-in-out infinite;
      opacity: 0.6;
    }
    
    .mesh-gradient-2 {
      background-color: rgba(10, 10, 10, 0.85);
      position: relative;
      overflow: hidden;
    }
    
    .mesh-gradient-2::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 80% 30%, rgba(234, 179, 8, 0.12), transparent 28%),
                  radial-gradient(circle at 20% 40%, rgba(234, 179, 8, 0.09), transparent 25%),
                  radial-gradient(circle at 60% 70%, rgba(250, 204, 21, 0.11), transparent 28%),
                  radial-gradient(circle at 10% 10%, rgba(202, 138, 4, 0.14), transparent 25%);
      z-index: 0;
      animation: meshMove 18s ease-in-out infinite alternate-reverse, meshFade 25s ease-in-out infinite;
      opacity: 0.8;
    }
    
    /* Mesh Gradient para a parte inferior do site */
    .main-content-wrapper {
      background-color: rgba(9, 9, 11, 0.95);
      position: relative;
      overflow: hidden;
    }
    
    .main-content-wrapper::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 85% 15%, rgba(234, 179, 8, 0.08), transparent 40%),
                  radial-gradient(circle at 15% 85%, rgba(234, 179, 8, 0.07), transparent 40%);
      z-index: 0;
      animation: subtleMeshMove 40s ease-in-out infinite alternate;
      opacity: 0.7;
    }
    
    @keyframes subtleMeshMove {
      0% {
        transform: translate(0, 0) rotate(0deg);
      }
      100% {
        transform: translate(2%, 2%) rotate(1deg);
      }
    }
    
    @keyframes meshMove {
      0% {
        transform: translate(0, 0) rotate(0deg);
      }
      25% {
        transform: translate(2%, -2%) rotate(1deg);
      }
      50% {
        transform: translate(-1%, 3%) rotate(-1deg);
      }
      75% {
        transform: translate(-3%, 1%) rotate(-2deg);
      }
      100% {
        transform: translate(5%, 5%) rotate(3deg);
      }
    }
    
    @keyframes meshFade {
      0%, 100% {
        background-position: 0% 0%;
      }
      25% {
        background-position: 15% 5%;
      }
      50% {
        background-position: 5% 15%;
      }
      75% {
        background-position: 10% -5%;
      }
    }
    
    /* Animações para os elementos decorativos */
    .mesh-blob {
      animation: blobFloat 20s ease-in-out infinite;
      opacity: 0;
    }
    
    .mesh-blob:nth-child(1) {
      animation-delay: 0s;
    }
    
    .mesh-blob:nth-child(2) {
      animation-delay: -5s;
    }
    
    .mesh-blob:nth-child(3) {
      animation-delay: -10s;
    }
    
    @keyframes blobFloat {
      0%, 100% {
        transform: translate(0, 0) scale(1);
        opacity: 0.2;
      }
      25% {
        transform: translate(5%, -5%) scale(1.1);
        opacity: 0.3;
      }
      50% {
        transform: translate(0, 8%) scale(0.9);
        opacity: 0.1;
      }
      75% {
        transform: translate(-5%, 3%) scale(1.2);
        opacity: 0.25;
      }
    }
    
    /* Efeito de pulsação para os gradientes */
    .pulse-effect {
      animation: pulsate 8s ease-in-out infinite;
    }
    
    @keyframes pulsate {
      0%, 100% {
        opacity: 0.7;
      }
      50% {
        opacity: 1;
      }
    }
    
    .content-container {
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body class="font-sans leading-normal tracking-normal bg-zinc-950 text-white">
  <!-- Header -->
  <header id="header"></header>

  <!-- Floating Nav (aparece quando a navbar principal some) -->
  <div id="floatingNav" class="fixed top-4 right-4 md:top-6 md:right-6 z-50 opacity-0 pointer-events-none transition-all duration-300">
    <div class="relative">
      <button id="floatingNavToggle" class="w-12 h-12 rounded-full bg-zinc-900/90 backdrop-blur-md border border-zinc-700 flex items-center justify-center hover:border-yellow-500 transition-all duration-200 shadow-lg">
        <img src="./media/images/mocap-logo-square.svg" alt="Menu" class="w-7 h-7">
      </button>
      <div id="floatingNavMenu" class="hidden absolute right-0 top-14 bg-zinc-900/95 backdrop-blur-md border border-zinc-800 rounded-xl shadow-2xl py-3 min-w-[180px] origin-top-right scale-95 opacity-0 transition-all duration-200" style="font-family: 'Space Grotesk', sans-serif;">
        <ul class="flex flex-col">
          <li><a href="#home" class="block px-5 py-3 hover:text-yellow-500 hover:bg-zinc-800/50 transition-colors text-sm font-medium">Home</a></li>
          <li><a href="#about" class="block px-5 py-3 hover:text-yellow-500 hover:bg-zinc-800/50 transition-colors text-sm font-medium">Sobre</a></li>
          <li><a href="#projects" class="block px-5 py-3 hover:text-yellow-500 hover:bg-zinc-800/50 transition-colors text-sm font-medium">Projetos</a></li>
          <li><a href="#skills" class="block px-5 py-3 hover:text-yellow-500 hover:bg-zinc-800/50 transition-colors text-sm font-medium">Habilidades</a></li>
          <li><a href="#contact" class="block px-5 py-3 hover:text-yellow-500 hover:bg-zinc-800/50 transition-colors text-sm font-medium">Contato</a></li>
          <li class="mx-3 mt-2 pt-2 border-t border-zinc-700">
            <button onclick="baixarArquivo()" class="w-full bg-yellow-500 text-black py-2 px-4 rounded-lg hover:bg-yellow-600 transition-colors text-sm font-semibold" style="font-family: 'Space Grotesk', sans-serif;">Baixar CV</button>
          </li>
        </ul>
      </div>
    </div>
  </div>
  
  <main id="main">
    <!-- Seções que não compartilham o mesh gradient -->
    <section id="home" class="text-center"></section>
    <section id="about" class="text-center"></section>
    
    <!-- Wrapper para todo o conteúdo restante com mesh gradient compartilhado -->
    <div class="main-content-wrapper">
      <!-- Elementos decorativos sutis -->
      <div class="absolute top-20 right-[15%] w-96 h-96 bg-yellow-500/[0.04] rounded-full blur-3xl"></div>
      <div class="absolute bottom-40 left-[20%] w-80 h-80 bg-yellow-600/[0.035] rounded-full blur-3xl"></div>
      <div class="absolute top-1/2 right-[30%] w-64 h-64 bg-amber-500/[0.03] rounded-full blur-3xl"></div>
      <div class="absolute bottom-1/3 left-[35%] w-72 h-72 bg-yellow-500/[0.025] rounded-full blur-3xl"></div>
      
      <!-- Seções com background transparente -->
      <div id="projects" class="bg-transparent"></div>
      <div id="parallax"></div>
      <section id="skills" class="bg-transparent text-center"></section>
      <div id="testimonials" class="bg-transparent"></div>
      <section id="contact" class="bg-transparent text-center"></section>
    </div>
  </main>
  <footer id="footer"></footer>

  <script src="js/main.js"></script>
  <script>
    // Controle do header ao rolar
    document.addEventListener('DOMContentLoaded', function() {
      // Efeito de interação com o mouse nos mesh gradientes
      const meshSections = document.querySelectorAll('.mesh-gradient-1, .mesh-gradient-2, .main-content-wrapper');
      
      meshSections.forEach(section => {
        const blobs = section.querySelectorAll('div[class*="bg-yellow"], div[class*="bg-amber"]');
        
        if (blobs.length > 0) {
          section.addEventListener('mousemove', function(e) {
            const { clientX, clientY } = e;
            const rect = section.getBoundingClientRect();
            const x = (clientX - rect.left) / rect.width;
            const y = (clientY - rect.top) / rect.height;
            
            // Mover levemente os elementos decorativos com base na posição do mouse
            blobs.forEach((blob, index) => {
              const factor = index % 2 === 0 ? 1 : -1;
              const moveX = (x - 0.5) * 10 * factor; // Movimento mais sutil
              const moveY = (y - 0.5) * 8 * factor;  // Movimento mais sutil
              
              blob.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
          });
          
          // Resetar as posições quando o mouse sair da seção
          section.addEventListener('mouseleave', function() {
            blobs.forEach(blob => {
              blob.style.transform = '';
            });
          });
        }
      });
      
      // Floating Nav: toggle do dropdown
      const floatingNavToggle = document.getElementById('floatingNavToggle');
      const floatingNavMenu = document.getElementById('floatingNavMenu');

      floatingNavToggle.addEventListener('click', function() {
        const isHidden = floatingNavMenu.classList.contains('hidden');
        if (isHidden) {
          floatingNavMenu.classList.remove('hidden');
          setTimeout(() => {
            floatingNavMenu.classList.remove('scale-95', 'opacity-0');
            floatingNavMenu.classList.add('scale-100', 'opacity-100');
          }, 10);
        } else {
          floatingNavMenu.classList.remove('scale-100', 'opacity-100');
          floatingNavMenu.classList.add('scale-95', 'opacity-0');
          setTimeout(() => floatingNavMenu.classList.add('hidden'), 200);
        }
      });

      // Fechar menu ao clicar em link
      floatingNavMenu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
          floatingNavMenu.classList.remove('scale-100', 'opacity-100');
          floatingNavMenu.classList.add('scale-95', 'opacity-0');
          setTimeout(() => floatingNavMenu.classList.add('hidden'), 200);
        });
      });

      // Fechar ao clicar fora
      document.addEventListener('click', function(e) {
        if (!floatingNavToggle.contains(e.target) && !floatingNavMenu.contains(e.target)) {
          floatingNavMenu.classList.remove('scale-100', 'opacity-100');
          floatingNavMenu.classList.add('scale-95', 'opacity-0');
          setTimeout(() => floatingNavMenu.classList.add('hidden'), 200);
        }
      });

      // Verificar se o header foi carregado
      function checkHeaderLoaded() {
        const header = document.getElementById('siteHeader');
        if (!header) {
          console.log("Header ainda não carregado, tentando novamente...");
          setTimeout(checkHeaderLoaded, 100);
          return;
        }

        console.log("Header carregado com sucesso!");
        const homeSection = document.getElementById('home');
        const floatingNav = document.getElementById('floatingNav');

        function updateHeader() {
          // Posição do scroll
          const scrollPos = window.scrollY;
          // Altura da seção home
          const homeSectionHeight = homeSection.offsetHeight;

          // Se estiver na seção home
          if (scrollPos < homeSectionHeight) {
            // Header visível com fundo semitransparente
            header.classList.remove('transform', 'translate-y-[-100%]');
            // Esconder floating nav
            floatingNav.classList.add('opacity-0', 'pointer-events-none');
            floatingNav.classList.remove('opacity-100');

            // Adicionar fundo escuro semitransparente quando rolar um pouco
            if (scrollPos > 50) {
              header.classList.add('bg-zinc-950/80', 'backdrop-blur-md');
              header.classList.remove('bg-transparent');
            } else {
              header.classList.add('bg-transparent');
              header.classList.remove('bg-zinc-950/80', 'backdrop-blur-md');
            }
          } else {
            // Esconder header quando sair da seção home
            header.classList.add('transform', 'translate-y-[-100%]');
            // Mostrar floating nav
            floatingNav.classList.remove('opacity-0', 'pointer-events-none');
            floatingNav.classList.add('opacity-100');
          }
        }

        // Executar ao carregar
        setTimeout(updateHeader, 100);

        // Executar ao rolar
        window.addEventListener('scroll', updateHeader);
      }

      // Iniciar a verificação
      checkHeaderLoaded();
      
      // Verificar se o componente home foi carregado completamente
      function checkHomeLoaded() {
        const typewriterElement = document.getElementById('typewriter');
        if (!typewriterElement) {
          console.log("Elemento typewriter ainda não está disponível, tentando novamente...");
          setTimeout(checkHomeLoaded, 100);
          return;
        }
        
        console.log("Componente home carregado completamente!");
      }
      
      // Iniciar a verificação do componente home
      setTimeout(checkHomeLoaded, 500);

      // Override da navegação para #contact: alinha o fundo da seção com o fundo do viewport
      // (elimina o espaço vazio abaixo dos ícones sem aumentar a altura da página)
      document.addEventListener('click', function(e) {
        const link = e.target.closest('a[href="#contact"]');
        if (!link) return;
        e.preventDefault();
        const contactEl = document.getElementById('contact');
        if (!contactEl) return;
        const contactBottom = contactEl.getBoundingClientRect().bottom + window.scrollY;
        const viewportH     = window.innerHeight;
        // Rola para que o fundo da seção fique alinhado com o fundo do viewport
        const scrollTo = contactBottom - viewportH;
        window.scrollTo({ top: Math.max(0, scrollTo), behavior: 'smooth' });
      });
    });
  </script>
</body>
</html>
